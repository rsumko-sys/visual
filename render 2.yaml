# OSINT Platform 2026 - Render Blueprint
# https://dashboard.render.com/blueprint/new?repo=https://github.com/fzfw7ckckt-glitch/visual

databases:
  - name: osint-postgres
    databaseName: osint
    plan: free

services:
  - type: redis
    name: osint-redis
    plan: free
    ipAllowList: []

  - type: web
    name: osint-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: osint-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: osint-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: osint-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: osint-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false

  - type: worker
    name: osint-celery
    runtime: docker
    dockerfilePath: ./worker/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: osint-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: osint-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: osint-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: osint-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false

  - type: web
    name: osint-web
    runtime: node
    plan: free
    buildCommand: cd web && npm ci && npm run build
    startCommand: cd web && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
