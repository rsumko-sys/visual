# Railway build config for OSINT Platform API
# Deploys the FastAPI backend (Dockerfile.api)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"

watchPatterns = [
  "app/**",
  "alembic/**",
  "requirements-api.txt",
  "Dockerfile.api",
  "railway.toml",
  "start.sh",
]

[deploy]
healthcheckPath = "/health/"
healthcheckTimeout = 180
# Use Dockerfile CMD (start.sh) so PORT is expanded inside container
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
